# Content-Security-Policy directives for the OpenCloud proxy.
# Loaded via PROXY_CSP_CONFIG_FILE_LOCATION in the opencloud container.
# Variable interpolation (e.g. ${IDP_DOMAIN|…}) is handled by the OpenCloud proxy at runtime.
directives:
  child-src:
    - '''self'''
  connect-src:
    - '''self'''
    - 'blob:'
    - 'https://${COMPANION_DOMAIN|companion.opencloud.test}/'
    - 'wss://${COMPANION_DOMAIN|companion.opencloud.test}/'
    - 'https://raw.githubusercontent.com/opencloud-eu/awesome-apps/'
    - 'https://${IDP_DOMAIN|keycloak.opencloud.test}/'
    - 'https://update.opencloud.eu/'
  default-src:
    - '''none'''
  font-src:
    - '''self'''
  frame-ancestors:
    - '''self'''
  frame-src:
    - '''self'''
    - 'blob:'
    - 'https://embed.diagrams.net/'
    - 'https://${COLLABORA_DOMAIN|collabora.opencloud.test}/'
    - 'https://docs.opencloud.eu'
  img-src:
    - '''self'''
    - 'data:'
    - 'blob:'
    - 'https://raw.githubusercontent.com/opencloud-eu/awesome-apps/'
    - 'https://tile.openstreetmap.org/'
    - 'https://${COLLABORA_DOMAIN|collabora.opencloud.test}/'
  manifest-src:
    - '''self'''
  media-src:
    - '''self'''
  object-src:
    - '''self'''
    - 'blob:'
  # unsafe-inline: required by OpenCloud's bundled web UI for inline scripts.
  # unsafe-eval: required by the web UI's JS runtime — without it, file downloads
  #   and other operations fail with a CSP script-src violation.
  script-src:
    - '''self'''
    - '''unsafe-inline'''
    - '''unsafe-eval'''
    - 'https://${IDP_DOMAIN|keycloak.opencloud.test}/'
  style-src:
    - '''self'''
    - '''unsafe-inline'''
