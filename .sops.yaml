# Age encryption keys for sops-nix secrets management.
# Each machine has its own key; masoodahmed is the sole admin key
# used from all dev machines (murderbot, work-pantheon, etc.).
# See docs/secrets-rotation.org for rotation and incident-response procedures.
keys:
  # --- NixOS machines ---
  - &accesscontrolsystem
    age1rx9mw350ymp2xwua05peyg0f8s354ad8lxl9kkzwkg7pmwnh2q3qvg3z8e
  - &commandmodule
    age1g54hxk0qqe24nh5n7vjsl6hpas42kdn3u4s7g3djgsenvqhkx48qn2xm7u
  - &commrelay
    age1p3zgy2putgsdfgvz7uf43crn47ta5gxsw2vvc3uvdjufc83g2a6slwaj7y
  - &meshcontrol
    age1knvvq7pkyyf0c3qsn5thssg2wg3yzvaay9ewxyqzc3gd8xlctyas7jfz3r
  - &watchfulsystem
    age1xgqt4c8v3uv0yeq5mfdj32ecy7qgzm65gg3qgtqprr6vg5aedgxqzh20lc
  - &caretaker
    age1gqvw59226drpwn8942x55jcf5zca5gfupj9eppmeagfevx3pupzs78dfs6
  - &heartbeat
    age1r84yxudulk0jgdtgcmu0qx79ztuxzrzrk4jl5s9n52x4874q35cqzu4enh
  - &arrakis
    age1qpdxlfwgwwnym09qjzr94chzwjnxj5f449nvvz4sgz8r2qrrn3sqtvvvzx
  - &sonic
    age1nsg2cqxkudumqj362mfeg5zfydgld9e78rwceancqx7lt3gr0dkqjnp9kp
  - &trialunit
    age1pcju0zkh2k3f8m7856k9ftzkjqw538jf255t2azusf9yr6v2nqksfn2pwa
  # --- Admin key (shared across all dev machines: murderbot, work-pantheon) ---
  - &masoodahmed
    age1s90xwvtqw9at892s8tyde9lp8vu3rs2lde7pwh7hayuc2sahmv6qmkwpff

# Creation rules: each regex maps a sops file to the set of age keys that can
# decrypt it. Every file includes masoodahmed (admin). Machine-specific files
# include only that machine + admin; shared files include all relevant machines.
creation_rules:
  # Global shared secrets — all NixOS machines + admin
  - path_regex: ^secrets/secrets\.sops\.yaml$
    key_groups:
      - age:
          - *accesscontrolsystem
          - *commrelay
          - *meshcontrol
          - *watchfulsystem
          - *caretaker
          - *arrakis
          - *commandmodule
          - *heartbeat
          - *sonic
          - *trialunit
          - *masoodahmed

  # Scoped secrets — headscale DNS/ACL only need meshcontrol + trialunit
  - path_regex: ^secrets/headscale-dns\.sops\.yaml$
    key_groups:
      - age:
        - *meshcontrol
        - *trialunit
        - *masoodahmed

  - path_regex: ^secrets/headscale-acl\.sops\.yaml$
    key_groups:
      - age:
        - *meshcontrol
        - *trialunit
        - *masoodahmed

  # Per-machine secrets — each machine + admin only
  - path_regex: ^machines/accesscontrolsystem/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *accesscontrolsystem
        - *masoodahmed

  - path_regex: ^machines/commandmodule/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *commandmodule
        - *masoodahmed

  - path_regex: ^machines/commrelay/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *commrelay
        - *masoodahmed

  - path_regex: ^machines/caretaker/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *caretaker
        - *masoodahmed

  - path_regex: ^machines/meshcontrol/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *meshcontrol
        - *masoodahmed

  - path_regex: ^machines/watchfulsystem/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *watchfulsystem
        - *masoodahmed

  - path_regex: ^machines/heartbeat/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *heartbeat
        - *masoodahmed

  - path_regex: ^machines/arrakis/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *arrakis
        - *masoodahmed

  # sonic shares secrets with commandmodule (paired laptops)
  - path_regex: ^machines/sonic/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *commandmodule
        - *sonic
        - *masoodahmed

  - path_regex: ^machines/trialunit/secrets\.sops\.yaml$
    key_groups:
      - age:
        - *trialunit
        - *masoodahmed

stores:
  yaml:
    indent: 2
  json:
    indent: 2
